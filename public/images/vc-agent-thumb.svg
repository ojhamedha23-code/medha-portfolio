<svg viewBox="0 0 400 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Cream paper background -->
  <rect width="400" height="240" fill="#FEF6EE"/>

  <!-- Corner accent dots (top-right) -->
  <circle cx="375" cy="16" r="3.5" fill="#8B1A2B" opacity="0.75"/>
  <circle cx="387" cy="28" r="2" fill="#8B1A2B" opacity="0.55"/>
  <circle cx="368" cy="34" r="2.5" fill="#8B1A2B" opacity="0.6"/>
  <line x1="378" y1="44" x2="392" y2="38" stroke="#8B1A2B" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>

  <!-- Document stack — back -->
  <rect x="38" y="32" width="178" height="182" rx="6" fill="white" stroke="#111111" stroke-width="1.4" opacity="0.4"/>
  <!-- Document stack — middle -->
  <rect x="48" y="42" width="178" height="182" rx="6" fill="white" stroke="#111111" stroke-width="1.7" opacity="0.65"/>
  <!-- Document stack — front -->
  <rect x="58" y="52" width="178" height="172" rx="6" fill="white" stroke="#111111" stroke-width="2.2"/>

  <!-- Document content -->
  <!-- Title line -->
  <line x1="78" y1="74" x2="200" y2="74" stroke="#111111" stroke-width="2" opacity="0.5"/>
  <!-- Subtitle -->
  <line x1="78" y1="86" x2="176" y2="86" stroke="#111111" stroke-width="1.2" opacity="0.32"/>
  <!-- Horizontal rule -->
  <line x1="78" y1="96" x2="218" y2="96" stroke="#111111" stroke-width="0.8" opacity="0.15"/>
  <!-- Body text lines -->
  <line x1="78" y1="108" x2="218" y2="108" stroke="#111111" stroke-width="1.2" opacity="0.28"/>
  <line x1="78" y1="118" x2="196" y2="118" stroke="#111111" stroke-width="1.2" opacity="0.22"/>
  <line x1="78" y1="128" x2="212" y2="128" stroke="#111111" stroke-width="1.2" opacity="0.28"/>
  <line x1="78" y1="138" x2="168" y2="138" stroke="#111111" stroke-width="1.2" opacity="0.2"/>

  <!-- Mini bar chart at bottom of document -->
  <line x1="78" y1="196" x2="224" y2="196" stroke="#111111" stroke-width="1.5" opacity="0.38"/>
  <rect x="84"  y="168" width="20" height="28" rx="2" fill="#F5EDE3" stroke="#111111" stroke-width="1.2" opacity="0.55"/>
  <rect x="112" y="176" width="20" height="20" rx="2" fill="#F5EDE3" stroke="#111111" stroke-width="1.2" opacity="0.55"/>
  <rect x="140" y="160" width="20" height="36" rx="2" fill="#FFF0E8" stroke="#8B1A2B" stroke-width="1.5"/>
  <rect x="168" y="180" width="20" height="16" rx="2" fill="#F5EDE3" stroke="#111111" stroke-width="1.2" opacity="0.55"/>
  <rect x="196" y="172" width="20" height="24" rx="2" fill="#F5EDE3" stroke="#111111" stroke-width="1.2" opacity="0.55"/>

  <!-- Analysis circle -->
  <circle cx="302" cy="118" r="70" fill="white" stroke="#111111" stroke-width="2.5"/>
  <circle cx="302" cy="118" r="60" fill="none" stroke="#111111" stroke-width="1" opacity="0.13" stroke-dasharray="6 4"/>

  <!-- Large checkmark inside circle -->
  <path d="M 260 118 L 280 140 L 342 88" stroke="#8B1A2B" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- PASS badge below checkmark -->
  <rect x="268" y="152" width="68" height="22" rx="4" fill="#FFF0E8" stroke="#8B1A2B" stroke-width="1.5"/>
  <!-- P A S S as short dashes (letterform suggestion) -->
  <line x1="278" y1="163" x2="289" y2="163" stroke="#8B1A2B" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
  <line x1="295" y1="163" x2="303" y2="163" stroke="#8B1A2B" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
  <line x1="309" y1="163" x2="317" y2="163" stroke="#8B1A2B" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
  <line x1="323" y1="163" x2="330" y2="163" stroke="#8B1A2B" stroke-width="2" stroke-linecap="round" opacity="0.75"/>

  <!-- Bottom-left accent dots -->
  <circle cx="20" cy="222" r="2.5" fill="#8B1A2B" opacity="0.4"/>
  <circle cx="12" cy="234" r="1.5" fill="#8B1A2B" opacity="0.28"/>
</svg>
