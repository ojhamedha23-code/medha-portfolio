<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Background -->
  <rect width="400" height="280" fill="#F7ECEE"/>

  <!-- Open book (base) -->
  <path d="M110 175 L110 105 C110 102 112 100 115 100 L195 108 L195 178Z" fill="none" stroke="#1C1917" stroke-width="2" stroke-linejoin="round"/>
  <path d="M290 175 L290 105 C290 102 288 100 285 100 L205 108 L205 178Z" fill="none" stroke="#1C1917" stroke-width="2" stroke-linejoin="round"/>
  <!-- Spine -->
  <line x1="200" y1="108" x2="200" y2="178" stroke="#1C1917" stroke-width="2" stroke-linecap="round"/>
  <!-- Book base curve -->
  <path d="M110 175 Q200 185 290 175" fill="none" stroke="#1C1917" stroke-width="2" stroke-linecap="round"/>

  <!-- Lines on left page -->
  <line x1="125" y1="120" x2="185" y2="122" stroke="#8B1A2B" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="125" y1="132" x2="185" y2="133" stroke="#8B1A2B" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="125" y1="144" x2="175" y2="145" stroke="#8B1A2B" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="125" y1="156" x2="185" y2="157" stroke="#8B1A2B" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Lines on right page -->
  <line x1="215" y1="120" x2="275" y2="122" stroke="#8B1A2B" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="215" y1="132" x2="275" y2="133" stroke="#8B1A2B" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="215" y1="144" x2="265" y2="145" stroke="#8B1A2B" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="215" y1="156" x2="275" y2="157" stroke="#8B1A2B" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Graduation cap above book -->
  <rect x="168" y="58" width="64" height="10" rx="1" fill="none" stroke="#8B1A2B" stroke-width="2"/>
  <polygon points="200,40 168,62 232,62" fill="none" stroke="#8B1A2B" stroke-width="2" stroke-linejoin="round"/>
  <!-- Tassel -->
  <line x1="232" y1="62" x2="240" y2="78" stroke="#8B1A2B" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="240" cy="80" r="3" fill="#8B1A2B"/>

  <!-- Globe left side -->
  <circle cx="85" cy="135" r="32" fill="none" stroke="#1C1917" stroke-width="1.5"/>
  <!-- Latitude lines -->
  <ellipse cx="85" cy="135" rx="32" ry="14" fill="none" stroke="#1C1917" stroke-width="1" opacity="0.5"/>
  <!-- Longitude line -->
  <line x1="85" y1="103" x2="85" y2="167" stroke="#1C1917" stroke-width="1" opacity="0.5"/>
  <!-- Continent blobs -->
  <path d="M75 118 C80 112 90 114 92 120 C94 126 88 130 82 128 C76 126 72 123 75 118Z" fill="#8B1A2B" opacity="0.2" stroke="#8B1A2B" stroke-width="1"/>
  <path d="M80 138 C84 133 92 136 90 143 C88 148 82 148 79 144 C76 140 77 141 80 138Z" fill="#8B1A2B" opacity="0.2" stroke="#8B1A2B" stroke-width="1"/>

  <!-- Stars top right -->
  <text x="318" y="75" font-size="16" fill="#8B1A2B" opacity="0.7">★</text>
  <text x="345" y="58" font-size="12" fill="#8B1A2B" opacity="0.5">★</text>
  <text x="305" y="55" font-size="10" fill="#8B1A2B" opacity="0.4">★</text>

  <!-- Growth arrow right side -->
  <path d="M318 165 L318 125 L338 125" fill="none" stroke="#1C1917" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="338,120 346,125 338,130" fill="#1C1917"/>
  <!-- Arrow steps -->
  <circle cx="318" cy="165" r="3" fill="#8B1A2B"/>
  <circle cx="318" cy="148" r="3" fill="#8B1A2B"/>
  <circle cx="318" cy="132" r="3" fill="#8B1A2B"/>

  <!-- Label -->
  <text x="200" y="218" font-family="Georgia, serif" font-size="11" font-weight="600" fill="#8B1A2B" text-anchor="middle" letter-spacing="5">STRATEGY · GROWTH</text>

  <!-- Ground line -->
  <line x1="60" y1="235" x2="340" y2="235" stroke="#8B1A2B" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
</svg>
