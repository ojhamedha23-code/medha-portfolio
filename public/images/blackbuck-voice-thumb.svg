<svg viewBox="0 0 400 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Cream paper background -->
  <rect width="400" height="240" fill="#FEF6EE"/>

  <!-- Corner accent dots (top-right) -->
  <circle cx="375" cy="16" r="3.5" fill="#8B1A2B" opacity="0.75"/>
  <circle cx="387" cy="28" r="2" fill="#8B1A2B" opacity="0.55"/>
  <circle cx="368" cy="34" r="2.5" fill="#8B1A2B" opacity="0.6"/>
  <line x1="378" y1="44" x2="392" y2="38" stroke="#8B1A2B" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>

  <!-- Truck trailer body -->
  <rect x="28" y="104" width="182" height="66" rx="3" fill="white" stroke="#111111" stroke-width="2.2"/>
  <!-- Trailer loading door lines -->
  <line x1="28" y1="128" x2="210" y2="128" stroke="#111111" stroke-width="1" opacity="0.2"/>
  <line x1="119" y1="104" x2="119" y2="170" stroke="#111111" stroke-width="1" opacity="0.18"/>
  <!-- Trailer ribbing / side detail -->
  <line x1="60"  y1="128" x2="60"  y2="170" stroke="#111111" stroke-width="0.8" opacity="0.15"/>
  <line x1="90"  y1="128" x2="90"  y2="170" stroke="#111111" stroke-width="0.8" opacity="0.15"/>
  <line x1="150" y1="128" x2="150" y2="170" stroke="#111111" stroke-width="0.8" opacity="0.15"/>
  <line x1="180" y1="128" x2="180" y2="170" stroke="#111111" stroke-width="0.8" opacity="0.15"/>

  <!-- Cab body -->
  <path d="M 210 170 L 210 112 C 212 104 219 100 228 99 L 284 99 C 300 99 310 108 312 128 L 312 170 Z"
        fill="white" stroke="#111111" stroke-width="2.2"/>
  <!-- Cab windshield -->
  <path d="M 225 108 L 225 142 L 282 142 L 287 128 L 287 108 Z"
        fill="#E8F0F4" stroke="#111111" stroke-width="1.5" opacity="0.72"/>
  <!-- Door panel line -->
  <line x1="252" y1="99" x2="252" y2="170" stroke="#111111" stroke-width="1" opacity="0.2"/>
  <!-- Door handle -->
  <rect x="241" y="140" width="8" height="14" rx="2" fill="none" stroke="#111111" stroke-width="1.2" opacity="0.35"/>

  <!-- Wheels (trailer x2 + cab x1) -->
  <circle cx="72"  cy="174" r="14" fill="#FEF6EE" stroke="#111111" stroke-width="2"/>
  <circle cx="72"  cy="174" r="5"  fill="#111111" opacity="0.18"/>
  <circle cx="170" cy="174" r="14" fill="#FEF6EE" stroke="#111111" stroke-width="2"/>
  <circle cx="170" cy="174" r="5"  fill="#111111" opacity="0.18"/>
  <circle cx="278" cy="174" r="14" fill="#FEF6EE" stroke="#111111" stroke-width="2"/>
  <circle cx="278" cy="174" r="5"  fill="#111111" opacity="0.18"/>

  <!-- Road -->
  <line x1="18" y1="188" x2="382" y2="188" stroke="#111111" stroke-width="1.5"/>
  <line x1="18" y1="194" x2="382" y2="194" stroke="#111111" stroke-width="1" opacity="0.25" stroke-dasharray="20 12"/>

  <!-- Voice / signal waves emanating rightward from cab -->
  <!-- Wave 1 (innermost) -->
  <path d="M 322 124 A 18 18 0 0 1 322 152"
        stroke="#111111" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>
  <!-- Wave 2 -->
  <path d="M 334 114 A 28 28 0 0 1 334 162"
        stroke="#111111" stroke-width="2.2" stroke-linecap="round" opacity="0.55"/>
  <!-- Wave 3 (outermost) -->
  <path d="M 348 103 A 39 39 0 0 1 348 173"
        stroke="#111111" stroke-width="2" stroke-linecap="round" opacity="0.35"/>

  <!-- Signal source dot (on cab, origin of the call) -->
  <circle cx="314" cy="138" r="4.5" fill="#8B1A2B" opacity="0.7"/>
  <circle cx="314" cy="138" r="2"   fill="white"/>

  <!-- Bottom-left accent dots -->
  <circle cx="20" cy="38" r="2.5" fill="#8B1A2B" opacity="0.45"/>
  <circle cx="12" cy="52" r="1.8" fill="#8B1A2B" opacity="0.32"/>
  <line   x1="22" y1="64" x2="32" y2="58" stroke="#8B1A2B" stroke-width="1.8" stroke-linecap="round" opacity="0.38"/>
</svg>
