<svg viewBox="0 0 400 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="240" fill="#FAFAF8"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="400" height="38" fill="#111111" fill-opacity="0.04"/>
  <text x="22" y="24" font-family="Georgia, serif" font-size="9" fill="#111111" opacity="0.55" letter-spacing="2">HR ATTRITION MODEL</text>

  <!-- AUC metric (top right) -->
  <text x="378" y="16" text-anchor="end" font-family="Georgia, serif" font-size="7.5" fill="#717580" letter-spacing="1">AUC SCORE</text>
  <text x="378" y="33" text-anchor="end" font-family="Georgia, serif" font-size="18" fill="#8B1A2B" opacity="0.85">0.86</text>

  <!-- Chart area -->
  <!-- Y axis -->
  <line x1="52" y1="48" x2="52" y2="192" stroke="#111111" stroke-opacity="0.18" stroke-width="1"/>
  <!-- X axis -->
  <line x1="52" y1="192" x2="382" y2="192" stroke="#111111" stroke-opacity="0.18" stroke-width="1"/>

  <!-- Subtle horizontal grid lines -->
  <line x1="52" y1="96"  x2="382" y2="96"  stroke="#111111" stroke-opacity="0.05" stroke-width="0.8"/>
  <line x1="52" y1="144" x2="382" y2="144" stroke="#111111" stroke-opacity="0.05" stroke-width="0.8"/>

  <!-- Y-axis labels -->
  <text x="46" y="99" text-anchor="end" font-family="Georgia, serif" font-size="7" fill="#717580" opacity="0.7">50%</text>
  <text x="46" y="147" text-anchor="end" font-family="Georgia, serif" font-size="7" fill="#717580" opacity="0.7">25%</text>

  <!-- 6 bars: x positions 62,112,162,212,262,312 width=38 -->
  <!-- Bar bottom at y=192 -->
  <!-- heights in px: Sales=68, Eng=90, HR=55, Ops=112, R&D=144 (highlighted), Mktg=75 -->

  <!-- Bar 1: Sales h=68 -->
  <rect x="62" y="124" width="38" height="68" rx="3" fill="#111111" fill-opacity="0.09"/>

  <!-- Bar 2: Engineering h=90 -->
  <rect x="112" y="102" width="38" height="90" rx="3" fill="#111111" fill-opacity="0.09"/>

  <!-- Bar 3: HR h=55 -->
  <rect x="162" y="137" width="38" height="55" rx="3" fill="#111111" fill-opacity="0.09"/>

  <!-- Bar 4: Operations h=112 -->
  <rect x="212" y="80" width="38" height="112" rx="3" fill="#111111" fill-opacity="0.12"/>

  <!-- Bar 5: R&D h=144 HIGHLIGHTED -->
  <rect x="262" y="48" width="38" height="144" rx="3" fill="#8B1A2B" opacity="0.55"/>
  <!-- Risk label above -->
  <text x="281" y="43" text-anchor="middle" font-family="Georgia, serif" font-size="7.5" fill="#8B1A2B" opacity="0.85">HIGH</text>

  <!-- Bar 6: Marketing h=75 -->
  <rect x="312" y="117" width="38" height="75" rx="3" fill="#111111" fill-opacity="0.09"/>

  <!-- X-axis labels -->
  <text x="81"  y="204" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#717580">Sales</text>
  <text x="131" y="204" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#717580">Eng</text>
  <text x="181" y="204" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#717580">HR</text>
  <text x="231" y="204" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#717580">Ops</text>
  <text x="281" y="204" text-anchor="middle" font-family="Georgia, serif" font-size="7.5" fill="#8B1A2B" opacity="0.75">R&amp;D</text>
  <text x="331" y="204" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#717580">Mktg</text>

  <!-- Trend line -->
  <polyline points="81,158 131,147 181,164 231,136 281,120 331,154"
            stroke="#8B1A2B" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.40"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Legend -->
  <rect x="22" y="216" width="10" height="10" rx="2" fill="#8B1A2B" opacity="0.55"/>
  <text x="36" y="225" font-family="Georgia, serif" font-size="7.5" fill="#717580">Attrition risk by dept</text>
  <line x1="200" y1="221" x2="220" y2="221" stroke="#8B1A2B" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.40" stroke-linecap="round"/>
  <text x="225" y="225" font-family="Georgia, serif" font-size="7.5" fill="#717580">Risk trend</text>
</svg>
