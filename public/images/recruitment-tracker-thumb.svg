  <line x1="133" y1="55" x2="133" y2="218" stroke="#111111" stroke-width="1" opacity="0.11" stroke-dasharray="5 3"/>
  <line x1="245" y1="55" x2="245" y2="218" stroke="#111111" stroke-width="1" opacity="0.11" stroke-dasharray="5 3"/>

  <!-- Column 1: Applied cards -->
  <rect x="30" y="82" width="96" height="38" rx="5" fill="white" stroke="#111111" stroke-width="1.8"/>
  <line x1="42" y1="94" x2="108" y2="94" stroke="#111111" stroke-width="1.2" opacity="0.38"/>
  <line x1="42" y1="106" x2="86" y2="106" stroke="#111111" stroke-width="1" opacity="0.22"/>

