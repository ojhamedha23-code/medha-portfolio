  <line x1="382" y1="57" x2="392" y2="53" stroke="#8B1A2B" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- App window frame -->
  <rect x="22" y="26" width="340" height="198" rx="10" fill="white" stroke="#111111" stroke-width="2.2"/>

  <!-- Window header bar -->
  <path d="M 22 36 Q 22 26 32 26 L 352 26 Q 362 26 362 36 L 362 52 L 22 52 Z" fill="#F5EDE3" stroke="#111111" stroke-width="2.2"/>
