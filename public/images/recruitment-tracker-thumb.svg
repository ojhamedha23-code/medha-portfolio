  <rect x="142" y="82" width="96" height="38" rx="5" fill="white" stroke="#111111" stroke-width="1.8"/>
  <line x1="154" y1="94" x2="222" y2="94" stroke="#111111" stroke-width="1.2" opacity="0.38"/>
  <line x1="154" y1="106" x2="198" y2="106" stroke="#111111" stroke-width="1" opacity="0.22"/>

  <rect x="142" y="128" width="96" height="38" rx="5" fill="white" stroke="#111111" stroke-width="1.8"/>
  <line x1="154" y1="140" x2="222" y2="140" stroke="#111111" stroke-width="1.2" opacity="0.38"/>
  <line x1="154" y1="152" x2="194" y2="152" stroke="#111111" stroke-width="1" opacity="0.22"/>

