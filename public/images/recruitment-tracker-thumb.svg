  <!-- Traffic light circles -->
  <circle cx="40" cy="39" r="4.5" fill="#E8A898" opacity="0.8"/>
  <circle cx="56" cy="39" r="4.5" fill="#8B1A2B" opacity="0.3"/>
  <circle cx="72" cy="39" r="4.5" fill="#111111" opacity="0.12"/>

