  <line x1="42" y1="140" x2="108" y2="140" stroke="#111111" stroke-width="1.2" opacity="0.38"/>
  <line x1="42" y1="152" x2="78" y2="152" stroke="#111111" stroke-width="1" opacity="0.22"/>

  <rect x="30" y="174" width="96" height="30" rx="5" fill="white" stroke="#111111" stroke-width="1.2" opacity="0.32"/>
  <line x1="42" y1="186" x2="98" y2="186" stroke="#111111" stroke-width="1" opacity="0.16"/>

