  <!-- Applied -->
  <rect x="30" y="58" width="96" height="16" rx="3" fill="#F5EDE3"/>
  <line x1="42" y1="66" x2="108" y2="66" stroke="#111111" stroke-width="1.5" opacity="0.42"/>
  <!-- Interview -->
  <rect x="142" y="58" width="96" height="16" rx="3" fill="#F5EDE3"/>
  <line x1="154" y1="66" x2="222" y2="66" stroke="#111111" stroke-width="1.5" opacity="0.42"/>
