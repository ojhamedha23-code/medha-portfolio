  <rect x="254" y="82" width="96" height="38" rx="5" fill="white" stroke="#8B1A2B" stroke-width="1.8"/>
  <!-- Checkmark -->
  <path d="M 267 103 L 276 113 L 296 90" stroke="#8B1A2B" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="308" y1="90" x2="340" y2="90" stroke="#111111" stroke-width="1" opacity="0.28"/>
  <line x1="308" y1="102" x2="332" y2="102" stroke="#111111" stroke-width="1" opacity="0.18"/>

  <rect x="254" y="128" width="96" height="38" rx="5" fill="white" stroke="#8B1A2B" stroke-width="1.5"/>
  <path d="M 267 149 L 276 159 L 296 136" stroke="#8B1A2B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
